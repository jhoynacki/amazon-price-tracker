worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 60M;   # Allow large order history uploads

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Rate limiting for auth endpoints
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name jack-hoy.com www.jack-hoy.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name jack-hoy.com www.jack-hoy.com;

        ssl_certificate     /etc/letsencrypt/live/jack-hoy.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/jack-hoy.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # /amazon → FastAPI backend
        location /amazon {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://backend:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_buffering    off;
        }

        # Stricter rate limit on auth endpoints
        location /amazon/auth {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass         http://backend:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Flower task monitor (restrict to internal if needed)
        location /flower/ {
            proxy_pass http://flower:5555/;
            proxy_set_header Host $host;
            # Uncomment to restrict to specific IPs:
            # allow YOUR_IP;
            # deny all;
        }

        # Default — serve your existing site
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }
}
